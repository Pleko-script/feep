<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomofocus</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Focus timer for deep work</p>
          <h1>Pomofocus</h1>
        </div>
        <div class="topbar-badge">Tauri desktop</div>
      </header>

      <section class="timer-card">
        <div class="mode-switch" role="tablist" aria-label="Timer-Modus">
          <button class="mode-tab is-active" type="button" data-mode="pomodoro" role="tab" aria-selected="true">
            Pomodoro
          </button>
          <button class="mode-tab" type="button" data-mode="shortBreak" role="tab" aria-selected="false">
            Short Break
          </button>
          <button class="mode-tab" type="button" data-mode="longBreak" role="tab" aria-selected="false">
            Long Break
          </button>
        </div>

        <p class="mode-caption" id="mode-caption">Focus session</p>
        <p class="timer-display" id="timer-display" aria-live="polite">25:00</p>

        <div class="controls">
          <button class="primary-action" id="start-pause-btn" type="button">Start</button>
          <button class="secondary-action" id="reset-btn" type="button">Reset</button>
        </div>
      </section>

      <section class="status-grid" aria-label="Timer-Status">
        <article class="status-card">
          <p class="status-label">Aktueller Fokusblock</p>
          <p class="status-value" id="session-count">#1</p>
        </article>

        <article class="status-card">
          <p class="status-label">Heute abgeschlossen</p>
          <p class="status-value" id="completed-count">0</p>
        </article>

        <article class="status-card">
          <p class="status-label">Nächster Wechsel</p>
          <p class="status-value status-value--small" id="next-label">Short Break</p>
        </article>
      </section>

      <section class="focus-panel">
        <div class="cycle-track" aria-label="Vierer-Zyklus">
          <span class="cycle-dot is-current" data-cycle="1"></span>
          <span class="cycle-dot" data-cycle="2"></span>
          <span class="cycle-dot" data-cycle="3"></span>
          <span class="cycle-dot" data-cycle="4"></span>
        </div>

        <p class="status-copy" id="status-copy">Zeit zum Fokussieren.</p>
        <p class="status-note">Nach 4 Fokus-Sessions wechselt der Timer automatisch in eine Long Break.</p>
      </section>
    </main>
  </body>
</html>
