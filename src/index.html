<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomofocus</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Fokus-Timer fuer konzentriertes Arbeiten</p>
          <h1>Pomofocus</h1>
        </div>
        <div class="topbar-actions">
          <button class="topbar-action" id="open-report-btn" type="button">Bericht</button>
          <button class="topbar-action" id="open-settings-btn" type="button">Einstellungen</button>
        </div>
      </header>

      <section class="timer-card">
        <div class="mode-switch" role="tablist" aria-label="Timer-Modus">
          <button class="mode-tab is-active" type="button" data-mode="pomodoro" role="tab" aria-selected="true">
            Pomodoro
          </button>
          <button class="mode-tab" type="button" data-mode="shortBreak" role="tab" aria-selected="false">
            Kurze Pause
          </button>
          <button class="mode-tab" type="button" data-mode="longBreak" role="tab" aria-selected="false">
            Lange Pause
          </button>
        </div>

        <p class="mode-caption" id="mode-caption">Fokuszeit</p>
        <p class="timer-display" id="timer-display" aria-live="polite">25:00</p>
        <div class="progress-rail" aria-hidden="true">
          <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="controls">
          <button class="primary-action" id="start-pause-btn" type="button">Start</button>
          <button class="secondary-action" id="reset-btn" type="button">Zuruecksetzen</button>
        </div>
        <p class="timer-note">Leertaste startet oder pausiert, `R` setzt den aktuellen Modus zurueck.</p>
      </section>

    </main>

    <div class="overlay" id="report-modal" hidden>
      <div class="overlay-backdrop" data-close-modal="report"></div>
      <section class="modal-card modal-card--report" role="dialog" aria-modal="true" aria-labelledby="report-title">
        <div class="modal-topbar">
          <div class="section-heading">
            <h2 id="report-title">Aktivitaetsuebersicht</h2>
            <div class="section-line"></div>
          </div>
          <button class="modal-close" type="button" data-close-modal="report" aria-label="Bericht schliessen">&times;</button>
        </div>

        <div class="summary-grid">
          <article class="summary-card">
            <div class="summary-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="8.5"></circle>
                <path d="M12 7.5V12H15.5"></path>
              </svg>
            </div>
            <p class="summary-value" id="hours-focused">0.0</p>
            <p class="summary-label">Fokusstunden</p>
          </article>

          <article class="summary-card">
            <div class="summary-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <rect x="4.5" y="6.5" width="15" height="13" rx="2"></rect>
                <path d="M8 4.5V8"></path>
                <path d="M16 4.5V8"></path>
                <path d="M4.5 10H19.5"></path>
              </svg>
            </div>
            <p class="summary-value" id="days-accessed">0</p>
            <p class="summary-label">aktive Tage</p>
          </article>

          <article class="summary-card">
            <div class="summary-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12.2 4.5C10.2 7.1 15.2 8.3 12.8 11.5C11.8 12.8 9.6 13.2 9.2 15.5C8.8 17.7 10.6 19.5 12.8 19.5C16.2 19.5 18 16.9 18 14.2C18 10.6 15.4 8.2 12.2 4.5Z"></path>
              </svg>
            </div>
            <p class="summary-value" id="day-streak">0</p>
            <p class="summary-label">Tagesserie</p>
          </article>
        </div>

        <div class="section-heading section-heading--compact">
          <h2>Fokusstunden</h2>
          <div class="section-line"></div>
        </div>

        <div class="chart-toolbar">
          <div class="range-switch" role="tablist" aria-label="Zeitraum waehlen">
            <button class="range-tab is-active" type="button" data-range="week" role="tab" aria-selected="true">Woche</button>
            <button class="range-tab" type="button" data-range="month" role="tab" aria-selected="false">Monat</button>
            <button class="range-tab" type="button" data-range="year" role="tab" aria-selected="false">Jahr</button>
          </div>

          <div class="period-nav">
            <button class="period-btn" id="period-prev" type="button" aria-label="Vorheriger Zeitraum">&lsaquo;</button>
            <p class="period-label" id="period-label">Diese Woche</p>
            <button class="period-btn" id="period-next" type="button" aria-label="Naechster Zeitraum">&rsaquo;</button>
          </div>
        </div>

        <div class="chart-panel">
          <div class="chart-legend">
            <span class="legend-swatch"></span>
            <span>Fokuszeit</span>
          </div>

          <div class="chart-grid" id="chart-grid"></div>
        </div>
      </section>
    </div>

    <div class="overlay" id="settings-modal" hidden>
      <div class="overlay-backdrop" data-close-modal="settings"></div>
      <section class="modal-card modal-card--settings" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal-topbar">
          <div class="section-heading">
            <h2 id="settings-title">Einstellungen</h2>
            <div class="section-line"></div>
          </div>
          <button class="modal-close" type="button" data-close-modal="settings" aria-label="Einstellungen schliessen">&times;</button>
        </div>

        <form class="settings-form" id="settings-form">
          <label class="settings-field">
            <span class="settings-label">Pomodoro</span>
            <div class="settings-input-wrap">
              <input id="settings-pomodoro" name="pomodoro" type="number" min="1" max="180" step="1" />
              <span>Min.</span>
            </div>
          </label>

          <label class="settings-field">
            <span class="settings-label">Kurze Pause</span>
            <div class="settings-input-wrap">
              <input id="settings-short-break" name="shortBreak" type="number" min="1" max="60" step="1" />
              <span>Min.</span>
            </div>
          </label>

          <label class="settings-field">
            <span class="settings-label">Lange Pause</span>
            <div class="settings-input-wrap">
              <input id="settings-long-break" name="longBreak" type="number" min="1" max="120" step="1" />
              <span>Min.</span>
            </div>
          </label>

          <div class="settings-actions">
            <button class="secondary-action secondary-action--dark" id="settings-reset-defaults" type="button">Standard</button>
            <button class="primary-action primary-action--compact" type="submit">Speichern</button>
          </div>
        </form>
      </section>
    </div>
  </body>
</html>
